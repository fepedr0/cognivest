<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>CogniVest - Login</title>
</head>
<body>
    <main id="container">
        <section id="calculator">
            <div id="form">
                <h1 id="title">CogniVest</h1>
                <p>Sua calculadora de investimentos</p>

                <div class="input-box">
                    <label>Email:</label>
                    <div class="input-field">
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                </div>

                <div class="input-box">
                    <label>Senha:</label>
                    <div class="input-field">
                        <input type="password" id="senha" placeholder="••••••••">
                    </div>
                </div>

                <button id="calculate" onclick="fazerLogin()">Entrar</button>
                <p style="text-align:center; margin-top: 1rem;">
                    Não tem conta? <a href="/cadastro" style="color:#ab7aff;">Cadastre-se</a>
                </p>
            </div>
        </section>
    </main>
    <script>
        function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            })
            .then(res => res.json())
            .then(data => {
                if (data.sucesso) {
                    window.location.href = '/calculadora';
                } else {
                    alert(data.erro);
                }
            });
        }
    </script>
</body>
</html>
